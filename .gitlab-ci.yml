workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG'

stages:
  - build
  - scan
  - deploy
  - promote
  - post_release_validate

variables:
  DOCKER_BUILDKIT: "1"
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:${CI_COMMIT_REF_SLUG}"
  IMAGE_SHA_TAG: "$CI_REGISTRY_IMAGE:${CI_COMMIT_SHORT_SHA}"

docker:seerrng:
  stage: build
  image: docker:27.5.1
  before_script:
    - docker info
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker buildx use default
  script:
    - >
      docker buildx build --network host
      --file Dockerfile
      --build-arg COMMIT_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
      --build-arg BUILD_VERSION="${CI_COMMIT_TAG:-$CI_COMMIT_REF_SLUG}"
      --tag "$IMAGE_TAG"
      --tag "$IMAGE_SHA_TAG"
      --push
      .
    - |
      if [ "$CI_COMMIT_BRANCH" = "$CI_DEFAULT_BRANCH" ]; then
        docker buildx imagetools create --tag "$CI_REGISTRY_IMAGE:latest" "$IMAGE_SHA_TAG"
      fi
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker buildx imagetools create --tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG" "$IMAGE_SHA_TAG"
      fi

.trivy_scan:
  stage: scan
  image:
    name: aquasec/trivy:0.58.2
    entrypoint: [""]
  script:
    - trivy image --username "$CI_REGISTRY_USER" --password "$CI_REGISTRY_PASSWORD" --exit-code 0 --severity HIGH,CRITICAL "$CS_IMAGE"

container_scanning:
  extends: .trivy_scan
  needs: ["docker:seerrng"]
  variables:
    CS_IMAGE: "$IMAGE_SHA_TAG"
  rules:
    - if: '$CI_COMMIT_BRANCH || $CI_COMMIT_TAG'

deploy:seerr.home:
  stage: deploy
  image: alpine:3.21
  needs: ["docker:seerrng"]
  variables:
    SEERRNG_DEPLOY_HOST: "kspls0"
    SEERRNG_DEPLOY_CONTAINER: "seerr-host"
    SEERRNG_DEPLOY_CONFIG_DIR: "/mnt/datapool_lvm_media/seerrng-config"
    SEERRNG_DEPLOY_IMAGE: "seerrng:hardcover-current"
    SEERRNG_DEPLOY_PORT: "5055"
  before_script:
    - apk add --no-cache docker-cli openssh-client curl
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - |
      if [ -n "${SEERRNG_DEPLOY_SSH_PRIVATE_KEY:-}" ]; then
        eval "$(ssh-agent -s)"
        printf '%s\n' "$SEERRNG_DEPLOY_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
      fi
    - ssh-keyscan "$SEERRNG_DEPLOY_HOST" >> ~/.ssh/known_hosts
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker pull "$IMAGE_SHA_TAG"
    - docker tag "$IMAGE_SHA_TAG" "$SEERRNG_DEPLOY_IMAGE"
    - docker save "$SEERRNG_DEPLOY_IMAGE" | ssh "$SEERRNG_DEPLOY_HOST" docker load
    - |
      ssh "$SEERRNG_DEPLOY_HOST" sh -s <<EOF
      set -eu
      docker rm -f "$SEERRNG_DEPLOY_CONTAINER" >/dev/null 2>&1 || true
      docker run -d \
        --name "$SEERRNG_DEPLOY_CONTAINER" \
        --network host \
        --restart unless-stopped \
        -e CONFIG_DIRECTORY=/app/config \
        -e LOG_LEVEL=info \
        -e TZ=America/Regina \
        -e PORT="$SEERRNG_DEPLOY_PORT" \
        -v "$SEERRNG_DEPLOY_CONFIG_DIR":/app/config \
        "$SEERRNG_DEPLOY_IMAGE"
      EOF
    - |
      ssh "$SEERRNG_DEPLOY_HOST" sh -s <<EOF
      set -eu
      for attempt in \$(seq 1 30); do
        if curl -fsS "http://127.0.0.1:$SEERRNG_DEPLOY_PORT/api/v1/status" | grep -F "$CI_COMMIT_SHORT_SHA"; then
          exit 0
        fi
        sleep 2
      done
      docker logs --tail 100 "$SEERRNG_DEPLOY_CONTAINER" >&2 || true
      exit 1
      EOF
  environment:
    name: seerr.home
    url: https://request.snape.tech
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

.github_publication_defaults:
  variables:
    GITHUB_MIRROR_URL: "git@github.com:snapetech/seerrng.git"
    GITHUB_REPOSITORY: "snapetech/seerrng"

# External publication is intentionally gated on all earlier GitLab stages.
# Set GITHUB_MIRROR_SSH_KEY, GITHUB_TOKEN, and GHCR_TOKEN in GitLab CI as needed.
github:mirror:
  extends: .github_publication_defaults
  stage: promote
  image: alpine:3.21
  before_script:
    - apk add --no-cache git openssh-client
    - eval "$(ssh-agent -s)"
    - printf '%s\n' "$GITHUB_MIRROR_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
  script:
    - test -n "$GITHUB_MIRROR_URL"
    - git remote add github-mirror "$GITHUB_MIRROR_URL"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        git push github-mirror "refs/tags/$CI_COMMIT_TAG:refs/tags/$CI_COMMIT_TAG"
      else
        git push github-mirror "HEAD:$CI_COMMIT_REF_NAME"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG'

github:release:
  extends: .github_publication_defaults
  stage: promote
  image:
    name: ghcr.io/cli/cli:2.63.2
    entrypoint: [""]
  needs: ["github:mirror"]
  script:
    - test -n "$GITHUB_TOKEN"
    - test -n "$GITHUB_REPOSITORY"
    - gh release create "$CI_COMMIT_TAG" --repo "$GITHUB_REPOSITORY" --title "$CI_COMMIT_TAG" --notes "Released from GitLab pipeline $CI_PIPELINE_URL" --verify-tag
    - gh workflow run release-assets.yml --repo "$GITHUB_REPOSITORY" -f tag="$CI_COMMIT_TAG"
    - gh workflow run release-linux-packages.yml --repo "$GITHUB_REPOSITORY" -f tag="$CI_COMMIT_TAG"
    - gh workflow run release-flatpak.yml --repo "$GITHUB_REPOSITORY" -f tag="$CI_COMMIT_TAG"
    - gh workflow run release-aur.yml --repo "$GITHUB_REPOSITORY" -f tag="$CI_COMMIT_TAG"
    - gh workflow run release-snap.yml --repo "$GITHUB_REPOSITORY" -f tag="$CI_COMMIT_TAG"
    - gh workflow run release-ppa.yml --repo "$GITHUB_REPOSITORY" -f tag="$CI_COMMIT_TAG"
    - gh workflow run release-copr.yml --repo "$GITHUB_REPOSITORY" -f tag="$CI_COMMIT_TAG"
  rules:
    - if: '$CI_COMMIT_TAG'

ghcr:promote:
  extends: .github_publication_defaults
  stage: promote
  image:
    name: quay.io/skopeo/stable:v1.17.0
    entrypoint: [""]
  script:
    - test -n "$GHCR_TOKEN"
    - test -n "$GITHUB_REPOSITORY"
    - export GHCR_USER="${GHCR_USER:-${GITHUB_REPOSITORY%%/*}}"
    - export GHCR_REPOSITORY="${GHCR_REPOSITORY:-ghcr.io/$(printf '%s' "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')}"
    - skopeo login -u "$GHCR_USER" -p "$GHCR_TOKEN" ghcr.io
    - skopeo login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - skopeo copy "docker://${IMAGE_SHA_TAG}" "docker://$GHCR_REPOSITORY:$CI_COMMIT_SHORT_SHA"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        skopeo copy "docker://${IMAGE_SHA_TAG}" "docker://$GHCR_REPOSITORY:$CI_COMMIT_TAG"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG'

dockerhub:promote:
  stage: promote
  image:
    name: quay.io/skopeo/stable:v1.17.0
    entrypoint: [""]
  script:
    - test -n "$DOCKERHUB_USERNAME"
    - test -n "$DOCKERHUB_TOKEN"
    - skopeo login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN" docker.io
    - skopeo login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - skopeo copy "docker://${IMAGE_SHA_TAG}" "docker://docker.io/snapetech/seerrng:$CI_COMMIT_SHORT_SHA"
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        skopeo copy "docker://${IMAGE_SHA_TAG}" "docker://docker.io/snapetech/seerrng:$CI_COMMIT_TAG"
        skopeo copy "docker://${IMAGE_SHA_TAG}" "docker://docker.io/snapetech/seerrng:latest"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_COMMIT_TAG'

.package_smoke_defaults:
  stage: post_release_validate
  needs:
    - job: github:release
      optional: true
    - job: ghcr:promote
      optional: true
    - job: dockerhub:promote
      optional: true
  variables:
    PACKAGE_SMOKE_ARTIFACT_DIR: "$CI_PROJECT_DIR/artifacts/package-smoke/$SMOKE_PROJECT/$SMOKE_CHANNEL/$SMOKE_ARCH"
  rules:
    - if: '$CI_COMMIT_TAG'
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - artifacts/package-smoke/
    reports:
      junit: artifacts/package-smoke/**/junit.xml

package-smoke:containers:
  extends: .package_smoke_defaults
  image: docker:27.5.1
  parallel:
    matrix:
      - SMOKE_PROJECT: seerrng
        SMOKE_CHANNEL: [container-ghcr, container-dockerhub]
        SMOKE_ARCH: [amd64, arm64]
  before_script:
    - apk add --no-cache bash curl
    - docker buildx use default || true
  script:
    - packaging/smoke/package-smoke "$SMOKE_PROJECT" "$SMOKE_CHANNEL" "$CI_COMMIT_TAG" --arch "$SMOKE_ARCH" --registry-tag "$CI_COMMIT_TAG"

package-smoke:ubuntu:
  extends: .package_smoke_defaults
  image: ubuntu:24.04
  parallel:
    matrix:
      - SMOKE_PROJECT: seerrng
        SMOKE_CHANNEL: [github-archive, deb]
        SMOKE_ARCH: amd64
  before_script:
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y bash ca-certificates curl jq unzip tar software-properties-common
  script:
    - packaging/smoke/package-smoke "$SMOKE_PROJECT" "$SMOKE_CHANNEL" "$CI_COMMIT_TAG" --arch "$SMOKE_ARCH"

package-smoke:delayed:
  extends: .package_smoke_defaults
  image: ubuntu:22.04
  allow_failure: true
  parallel:
    matrix:
      - SMOKE_PROJECT: seerrng
        SMOKE_CHANNEL: [ppa, snap]
        SMOKE_ARCH: amd64
  before_script:
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y bash ca-certificates curl jq unzip tar software-properties-common snapd
  script:
    - packaging/smoke/package-smoke "$SMOKE_PROJECT" "$SMOKE_CHANNEL" "$CI_COMMIT_TAG" --arch "$SMOKE_ARCH"

package-smoke:fedora:
  extends: .package_smoke_defaults
  image: fedora:43
  allow_failure: true
  parallel:
    matrix:
      - SMOKE_PROJECT: seerrng
        SMOKE_CHANNEL: [rpm, copr]
        SMOKE_ARCH: amd64
  before_script:
    - dnf install -y bash ca-certificates curl jq unzip tar dnf-plugins-core
  script:
    - packaging/smoke/package-smoke "$SMOKE_PROJECT" "$SMOKE_CHANNEL" "$CI_COMMIT_TAG" --arch "$SMOKE_ARCH"

package-smoke:arch:
  extends: .package_smoke_defaults
  image: archlinux:base-devel
  allow_failure: true
  parallel:
    matrix:
      - SMOKE_PROJECT: seerrng
        SMOKE_CHANNEL: aur-bin
        SMOKE_ARCH: amd64
  before_script:
    - pacman -Sy --noconfirm --needed bash ca-certificates curl git sudo
    - useradd -m package-smoke
    - "printf 'package-smoke ALL=(ALL) NOPASSWD: ALL\n' >/etc/sudoers.d/package-smoke"
    - chown -R package-smoke:package-smoke "$CI_PROJECT_DIR"
  script:
    - sudo -u package-smoke env PACKAGE_SMOKE_ARTIFACT_DIR="$PACKAGE_SMOKE_ARTIFACT_DIR" packaging/smoke/package-smoke "$SMOKE_PROJECT" "$SMOKE_CHANNEL" "$CI_COMMIT_TAG" --arch "$SMOKE_ARCH"
