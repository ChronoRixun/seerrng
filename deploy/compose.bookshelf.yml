services:
  rreading-glasses-postgres:
    image: postgres:16-alpine
    container_name: ${RREADING_GLASSES_POSTGRES_CONTAINER_NAME:-rreading-glasses-postgres}
    profiles:
      - softcover
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${RREADING_GLASSES_POSTGRES_DB:-rreading-glasses}
      POSTGRES_USER: ${RREADING_GLASSES_POSTGRES_USER:-rreading}
      POSTGRES_PASSWORD: ${RREADING_GLASSES_POSTGRES_PASSWORD:?set RREADING_GLASSES_POSTGRES_PASSWORD}
    ports:
      - '127.0.0.1:${RREADING_GLASSES_POSTGRES_PORT:-15433}:5432'
    volumes:
      - ${RREADING_GLASSES_POSTGRES_DIR:-/mnt/datapool_lvm_media/rreading-glasses-postgres/data}:/var/lib/postgresql/data

  rreading-glasses:
    image: blampe/rreading-glasses:latest
    container_name: ${RREADING_GLASSES_CONTAINER_NAME:-rreading-glasses}
    profiles:
      - softcover
    network_mode: host
    restart: unless-stopped
    depends_on:
      - rreading-glasses-postgres
    environment:
      POSTGRES_HOST: ${RREADING_GLASSES_POSTGRES_HOST:-127.0.0.1}
      POSTGRES_PORT: ${RREADING_GLASSES_POSTGRES_PORT:-15433}
      POSTGRES_DATABASE: ${RREADING_GLASSES_POSTGRES_DB:-rreading-glasses}
      POSTGRES_USER: ${RREADING_GLASSES_POSTGRES_USER:-rreading}
      POSTGRES_PASSWORD: ${RREADING_GLASSES_POSTGRES_PASSWORD:?set RREADING_GLASSES_POSTGRES_PASSWORD}
      PORT: ${RREADING_GLASSES_PORT:-8790}
    command:
      [
        '/main',
        'serve',
        '--upstream=${RREADING_GLASSES_UPSTREAM:-www.goodreads.com}',
        '--port=${RREADING_GLASSES_PORT:-8790}',
      ]

  bookshelf-ebooks:
    image: ${BOOKSHELF_IMAGE:-ghcr.io/snapetech/bookshelfng:hardcover}
    container_name: ${BOOKSHELF_EBOOKS_CONTAINER_NAME:-bookshelf-ebooks}
    network_mode: host
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-953}
      TZ: ${TZ:-America/Regina}
      METADATA_URL: ${BOOKSHELF_METADATA_URL:-https://hardcover.bookinfo.pro}
      HARDCOVER: ${BOOKSHELF_HARDCOVER:-}
    volumes:
      - ${BOOKSHELF_EBOOKS_CONFIG_DIR:-/mnt/datapool_lvm_media/readarr-config}:/config
      - ${MEDIA_ROOT:-/mnt/datapool_lvm_media}:/data
      - ${DOWNLOAD_ROOT:-/mnt/datapool_lvm_media/download}:/download
      - ${MEDIA_ROOT:-/mnt/datapool_lvm_media}:/downloads
      - ${PLEX_ROOT:-/mnt/datapool_lvm_media/plex}:/plex
      - ${PLEX_ROOT:-/mnt/datapool_lvm_media/plex}:/media/plex

  bookshelf-audiobooks:
    image: ${BOOKSHELF_IMAGE:-ghcr.io/snapetech/bookshelfng:hardcover}
    container_name: ${BOOKSHELF_AUDIOBOOKS_CONTAINER_NAME:-bookshelf-audiobooks}
    network_mode: host
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-953}
      TZ: ${TZ:-America/Regina}
      METADATA_URL: ${BOOKSHELF_METADATA_URL:-https://hardcover.bookinfo.pro}
      HARDCOVER: ${BOOKSHELF_HARDCOVER:-}
    volumes:
      - ${BOOKSHELF_AUDIOBOOKS_CONFIG_DIR:-/mnt/datapool_lvm_media/bookshelf-audiobooks-config}:/config
      - ${MEDIA_ROOT:-/mnt/datapool_lvm_media}:/data
      - ${DOWNLOAD_ROOT:-/mnt/datapool_lvm_media/download}:/download
      - ${MEDIA_ROOT:-/mnt/datapool_lvm_media}:/downloads
      - ${PLEX_ROOT:-/mnt/datapool_lvm_media/plex}:/plex
      - ${PLEX_ROOT:-/mnt/datapool_lvm_media/plex}:/media/plex
