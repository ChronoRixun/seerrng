services:
  seerrng:
    image: ghcr.io/snapetech/seerrng:${SEERRNG_TAG:-main}
    container_name: ${SEERRNG_CONTAINER_NAME:-seerrng}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Regina}
      PORT: 5055
      CONFIG_DIRECTORY: /app/config
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${SEERRNG_PORT:-5055}:5055"
    volumes:
      - ${SEERRNG_CONFIG_DIR:-/opt/seerrng/config}:/app/config
