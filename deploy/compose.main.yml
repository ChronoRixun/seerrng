services:
  seerrng:
    image: ghcr.io/snapetech/seerrng:${SEERRNG_TAG:-main}
    container_name: ${SEERRNG_CONTAINER_NAME:-seerr-host}
    network_mode: host
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Regina}
      PORT: 5055
      CONFIG_DIRECTORY: /app/config
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${SEERRNG_CONFIG_DIR:-/mnt/datapool_lvm_media/seerrng-config}:/app/config
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5055/api/v1/status').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
