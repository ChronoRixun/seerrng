---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: SeerrNG Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_HUB: snapetech/seerrng

jobs:
  validate-main-tag:
    name: Validate main release tag
    runs-on: [self-hosted, Linux, X64, seerrng]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure tag is on main
        shell: bash
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tags must point at commits contained in origin/main."
            exit 1
          fi

  changelog:
    name: Generate changelog
    needs: validate-main-tag
    runs-on: [self-hosted, Linux, X64, seerrng]
    permissions:
      contents: read
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Generate changelog
        id: git-cliff
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: .github/cliff.toml
          args: -vv --current
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

  create-draft-release:
    name: Create draft release
    runs-on: [self-hosted, Linux, X64, seerrng]
    permissions:
      contents: write
    needs: changelog
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Draft Release
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          Release ${GITHUB_REF_NAME}.

          Container images and package-channel workflows are published by this release pipeline.
          EOF
          gh release create "${GITHUB_REF_NAME}" \
            -t "Release ${GITHUB_REF_NAME}" \
            -F release-notes.md \
            --draft || gh release edit "${GITHUB_REF_NAME}" \
            -t "Release ${GITHUB_REF_NAME}" \
            -F release-notes.md \
            --draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.arch }})
    needs: validate-main-tag
    strategy:
      matrix:
        include:
          - runner: linux-amd64
            platform: linux/amd64
            arch: amd64
          - runner: linux-arm64-cross
            platform: linux/arm64
            arch: arm64
    runs-on: [self-hosted, Linux, X64, "${{ matrix.runner }}", seerrng]
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Commit timestamp
        id: ts
        run: echo "TIMESTAMP=$(git log -1 --pretty=%ct)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: network=host

      - name: Warm cache [${{ matrix.platform }}]
        shell: bash
        run: |
          set -euo pipefail

          build_args=(
            --file ./Dockerfile
            --platform "${{ matrix.platform }}"
            --build-arg "COMMIT_TAG=${{ github.sha }}"
            --build-arg "BUILD_VERSION=${{ env.VERSION }}"
            --build-arg "SOURCE_DATE_EPOCH=${{ steps.ts.outputs.TIMESTAMP }}"
            --cache-from "type=gha,scope=${{ matrix.platform }}"
            --cache-to "type=gha,mode=max,scope=${{ matrix.platform }}"
            --provenance false
          )

          for attempt in 1 2 3 4 5; do
            echo "Warming cache for ${{ matrix.platform }} (attempt ${attempt}/5)"
            if docker buildx build "${build_args[@]}" .; then
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Cache warm build failed after ${attempt} attempts" >&2
              exit 1
            fi
            sleep $((attempt * 30))
          done

  publish:
    name: Publish multi-arch manifests
    needs: build
    runs-on: [self-hosted, Linux, X64, seerrng]
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.digests.outputs.IMAGE_DIGEST }}
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Commit timestamp
        id: ts
        run: echo "TIMESTAMP=$(git log -1 --pretty=%ct)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: network=host

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: |
            ${{ env.DOCKER_HUB }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{raw}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
          labels: |
            org.opencontainers.image.created=${{ steps.ts.outputs.TIMESTAMP }}

      - name: Build & Push (multi-arch)
        shell: bash
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          set -euo pipefail

          build_args=(
            --file ./Dockerfile
            --platform linux/amd64,linux/arm64
            --push
            --build-arg "COMMIT_TAG=${{ github.sha }}"
            --build-arg "BUILD_VERSION=${{ env.VERSION }}"
            --build-arg "SOURCE_DATE_EPOCH=${{ steps.ts.outputs.TIMESTAMP }}"
            --cache-from type=gha,scope=linux/amd64
            --cache-from type=gha,scope=linux/arm64
            --cache-to type=gha,mode=max
            --provenance false
          )

          while IFS= read -r tag; do
            [ -n "$tag" ] && build_args+=(--tag "$tag")
          done <<< "$IMAGE_TAGS"

          while IFS= read -r label; do
            [ -n "$label" ] && build_args+=(--label "$label")
          done <<< "$IMAGE_LABELS"

          for attempt in 1 2 3 4 5; do
            echo "Building and pushing release image (attempt ${attempt}/5)"
            if docker buildx build "${build_args[@]}" .; then
              exit 0
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Release image build/push failed after ${attempt} attempts" >&2
              exit 1
            fi
            sleep $((attempt * 30))
          done

      - name: Resolve manifest digest
        id: digests
        run: |
          DIGEST=$(docker buildx imagetools inspect "${{ env.DOCKER_HUB }}:${{ env.VERSION }}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "IMAGE_DIGEST=$DIGEST" >> $GITHUB_OUTPUT

      - name: Also tag :latest (non-pre-release only)
        shell: bash
        if: ${{ !contains(env.VERSION, '-') }}
        run: |
          docker buildx imagetools create \
            -t ${{ env.DOCKER_HUB }}:latest \
            ${{ env.DOCKER_HUB }}:${{ env.VERSION }}

          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:latest \
            ghcr.io/${{ github.repository }}:${{ env.VERSION }}

  sign:
    name: Sign images and create SBOM attestations
    needs: publish
    runs-on: [self-hosted, Linux, X64, seerrng]
    permissions:
      contents: read
      id-token: write
      packages: write
    env:
      VERSION: ${{ github.ref_name }}
      COSIGN_YES: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign images
        run: |
          cosign sign --recursive "ghcr.io/${{ github.repository }}@${{ needs.publish.outputs.image_digest }}"
          cosign sign --recursive "${{ env.DOCKER_HUB }}@${{ needs.publish.outputs.image_digest }}"

      - name: Generate SBOMs
        run: |
          trivy image --format cyclonedx --output seerr-ghcr-image-${{ env.VERSION }}.sbom \
            "ghcr.io/${{ github.repository }}@${{ needs.publish.outputs.image_digest }}"

          trivy image --format cyclonedx --output seerr-dockerhub-image-${{ env.VERSION }}.sbom \
            "${{ env.DOCKER_HUB }}@${{ needs.publish.outputs.image_digest }}"

      - name: Attest SBOMs
        run: |
          cosign attest \
            --type cyclonedx \
            --predicate seerr-ghcr-image-${{ env.VERSION }}.sbom \
            "ghcr.io/${{ github.repository }}@${{ needs.publish.outputs.image_digest }}"

          cosign attest \
            --type cyclonedx \
            --predicate seerr-dockerhub-image-${{ env.VERSION }}.sbom \
            "${{ env.DOCKER_HUB }}@${{ needs.publish.outputs.image_digest }}"

      - name: Upload SBOMs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sboms-${{ env.VERSION }}
          path: '*.sbom'
          if-no-files-found: error
          retention-days: 1

  verify:
    name: Verify signatures and attestations
    needs: [publish, sign]
    runs-on: [self-hosted, Linux, X64, seerrng]
    permissions:
      contents: read
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify signatures
        run: |
          cosign verify "ghcr.io/${{ github.repository }}@${{ needs.publish.outputs.image_digest }}" \
            --certificate-identity "https://github.com/${{ github.workflow_ref }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

          cosign verify "${{ env.DOCKER_HUB }}@${{ needs.publish.outputs.image_digest }}" \
            --certificate-identity "https://github.com/${{ github.workflow_ref }}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      # - name: Verify attestations
      #   run: |
      #     cosign verify-attestation "ghcr.io/${{ github.repository }}@${{ needs.publish.outputs.image_digest }}" \
      #       --type cyclonedx \
      #       --certificate-identity "https://github.com/${{ github.workflow_ref }}" \
      #       --certificate-oidc-issuer "https://token.actions.githubusercontent.com" > /dev/null

      #     cosign verify-attestation "${{ env.DOCKER_HUB }}@${{ needs.publish.outputs.image_digest }}" \
      #       --type cyclonedx \
      #       --certificate-identity "https://github.com/${{ github.workflow_ref }}" \
      #       --certificate-oidc-issuer "https://token.actions.githubusercontent.com" > /dev/null

  publish-release:
    name: Publish release
    needs: [create-draft-release, verify]
    runs-on: [self-hosted, Linux, X64, seerrng]
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Publish release
        run: gh release edit "${{ env.VERSION }}" --draft=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dispatch-package-channels:
    name: Dispatch package channels
    needs: publish-release
    runs-on: [self-hosted, Linux, X64, seerrng]
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch package workflows
        env:
          GH_TOKEN: ${{ secrets.GH_WORKFLOW_TOKEN || secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          for workflow in \
            release-assets.yml \
            release-linux-packages.yml \
            release-flatpak.yml \
            release-aur.yml \
            release-snap.yml \
            release-ppa.yml \
            release-copr.yml
          do
            gh workflow run "$workflow" --repo "$REPO" -f "tag=$TAG"
          done

  announce-discord:
    name: Announce release to Discord
    needs: [changelog, publish, publish-release]
    runs-on: [self-hosted, Linux, X64, seerrng]
    permissions:
      contents: read
    env:
      VERSION: ${{ github.ref_name }}
      DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
      IMAGE_DIGEST: ${{ needs.publish.outputs.image_digest }}
    steps:
      - name: Send Discord announcement
        if: env.DISCORD_WEBHOOK != ''
        shell: bash
        run: |
          release_url="${{ github.server_url }}/${{ github.repository }}/releases/tag/${VERSION}"
          image_ref="ghcr.io/${{ github.repository }}:${VERSION}"
          body="Container images and package-channel workflows are published by this release pipeline."

          jq -n \
            --arg username "SeerrNG Releases" \
            --arg title "SeerrNG ${VERSION} is live" \
            --arg url "$release_url" \
            --arg description "$body" \
            --arg image "$image_ref" \
            --arg digest "$IMAGE_DIGEST" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              username: $username,
              embeds: [{
                title: $title,
                url: $url,
                description: (if $description == "" then "Release notes are available on GitHub." else $description end),
                color: 5814783,
                fields: [
                  { name: "Image", value: ("`" + $image + "`"), inline: false },
                  { name: "Digest", value: ("`" + $digest + "`"), inline: false },
                  { name: "Workflow", value: $run_url, inline: false }
                ]
              }]
            }' > payload.json

          curl -sS -H "Content-Type: application/json" \
            -X POST \
            --data @payload.json \
            "$DISCORD_WEBHOOK"
