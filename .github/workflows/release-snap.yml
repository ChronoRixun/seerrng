name: Publish Snap

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true

permissions:
  contents: read

jobs:
  publish-snap:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          tag="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Download Linux asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          for attempt in {1..80}; do
            if gh release download "$TAG" --pattern "seerrng-${TAG}-linux-x64.tar.gz" --dir packaging/snap --clobber; then
              exit 0
            fi
            sleep 30
          done
          exit 1

      - name: Prepare snapcraft
        run: |
          set -euo pipefail
          cd packaging/snap
          asset="seerrng-${{ steps.version.outputs.tag }}-linux-x64.tar.gz"
          rm -rf src
          mkdir src
          tar -xzf "$asset" --strip-components=1 -C src
          sed -i "s/^version: .*/version: '${{ steps.version.outputs.version }}'/" snapcraft.yaml

      - uses: snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79 # v1
        id: build
        with:
          path: packaging/snap

      - uses: snapcore/action-publish@214b86e5ca036ead1668c79afb81e550e6c54d40 # v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable
