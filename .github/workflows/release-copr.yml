name: Publish COPR

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true

permissions:
  contents: read

jobs:
  publish-copr:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: version
        run: |
          tag="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Linux asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in {1..80}; do
            if gh release download "${{ steps.version.outputs.tag }}" -R "$GITHUB_REPOSITORY" --pattern "seerrng-${{ steps.version.outputs.tag }}-linux-x64.tar.gz" --clobber; then
              exit 0
            fi
            sleep 30
          done
          exit 1

      - name: Install RPM/COPR tooling
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates krb5-k5tls krb5-pkinit krb5-user libkrb5-dev oathtool rpm python3-pip python3-venv
          python3 -m venv "$RUNNER_TEMP/copr"
          "$RUNNER_TEMP/copr/bin/python" -m pip install --upgrade pip copr-cli requests-gssapi rich
          echo "$RUNNER_TEMP/copr/bin" >> "$GITHUB_PATH"

      - name: Configure COPR
        env:
          COPR_LOGIN: ${{ secrets.COPR_LOGIN }}
          COPR_TOKEN: ${{ secrets.COPR_TOKEN }}
          COPR_USERNAME: ${{ secrets.COPR_USERNAME }}
          COPR_KERBEROS_PRINCIPAL: ${{ secrets.COPR_KERBEROS_PRINCIPAL }}
          COPR_KERBEROS_KEYTAB_B64: ${{ secrets.COPR_KERBEROS_KEYTAB_B64 }}
          COPR_FEDORA_USERNAME: ${{ secrets.COPR_FEDORA_USERNAME }}
          COPR_FEDORA_PASSWORD: ${{ secrets.COPR_FEDORA_PASSWORD }}
          COPR_FEDORA_OTP_SECRET: ${{ secrets.COPR_FEDORA_OTP_SECRET }}
        run: |
          set -euo pipefail
          username="${COPR_USERNAME:-keefshape}"
          mkdir -p ~/.config

          configure_token() {
            cat > ~/.config/copr <<EOF
          [copr-cli]
          login = ${COPR_LOGIN}
          username = ${username}
          token = ${COPR_TOKEN}
          copr_url = https://copr.fedorainfracloud.org
          EOF
          }

          configure_fedora_kerberos() {
            sudo install -d -m 0755 /etc/ipa
            curl -fsSL https://id.fedoraproject.org/ipa/config/ca.crt | sudo tee /etc/ipa/ca.crt >/dev/null || return 1
            krb5_config="$RUNNER_TEMP/fedora-krb5.conf"
            cat > "$krb5_config" <<'EOF'
          [libdefaults]
           default_realm = FEDORAPROJECT.ORG
           dns_lookup_realm = false
           rdns = false
           dns_canonicalize_hostname = false

          [realms]
           FEDORAPROJECT.ORG = {
            kdc = https://id.fedoraproject.org/KdcProxy
            pkinit_anchors = FILE:/etc/ipa/ca.crt
           }

          [domain_realm]
           .fedoraproject.org = FEDORAPROJECT.ORG
           fedoraproject.org = FEDORAPROJECT.ORG
          EOF
            export KRB5_CONFIG="$krb5_config"
            echo "KRB5_CONFIG=$krb5_config" >> "$GITHUB_ENV"
          }

          configure_kerberos_keytab() {
            configure_fedora_kerberos || return 1
            keytab="$RUNNER_TEMP/copr.keytab"
            ccache="$RUNNER_TEMP/copr.krb5cc"
            printf '%s' "$COPR_KERBEROS_KEYTAB_B64" | base64 -d > "$keytab" || return 1
            chmod 0600 "$keytab"
            KRB5CCNAME="FILE:$ccache" kinit -kt "$keytab" "$COPR_KERBEROS_PRINCIPAL" || return 1
            rm -f "$keytab"
            export KRB5CCNAME="FILE:$ccache"
            echo "KRB5CCNAME=$KRB5CCNAME" >> "$GITHUB_ENV"
            cat > ~/.config/copr <<EOF
          [copr-cli]
          username = ${username}
          copr_url = https://copr.fedorainfracloud.org
          gssapi = true
          EOF
          }

          configure_fedora_password() {
            configure_fedora_kerberos || return 1
            ccache="$RUNNER_TEMP/copr.krb5cc"
            armor="$RUNNER_TEMP/copr.krb5cc.armor"
            otp="$(oathtool --totp --base32 "$COPR_FEDORA_OTP_SECRET")" || return 1
            KRB5CCNAME="FILE:$armor" kinit -n @FEDORAPROJECT.ORG || return 1
            printf '%s%s\n' "$COPR_FEDORA_PASSWORD" "$otp" \
              | KRB5CCNAME="FILE:$ccache" kinit -T "FILE:$armor" "${COPR_FEDORA_USERNAME}@FEDORAPROJECT.ORG" || return 1
            KRB5CCNAME="FILE:$armor" kdestroy || true
            export KRB5CCNAME="FILE:$ccache"
            echo "KRB5CCNAME=$KRB5CCNAME" >> "$GITHUB_ENV"
            cat > ~/.config/copr <<EOF
          [copr-cli]
          username = ${username}
          copr_url = https://copr.fedorainfracloud.org
          gssapi = true
          EOF
          }

          try_copr_auth() {
            label="$1"
            shift
            rm -f ~/.config/copr
            if "$@" && copr-cli list "$username" >/dev/null 2>&1; then
              echo "COPR authentication configured with ${label}."
              return 0
            fi
            echo "COPR authentication failed with ${label}; trying the next configured method." >&2
            return 1
          }

          configured=0
          if [[ -n "${COPR_KERBEROS_PRINCIPAL:-}" && -n "${COPR_KERBEROS_KEYTAB_B64:-}" ]]; then
            try_copr_auth "Kerberos keytab" configure_kerberos_keytab && configured=1
          fi
          if [[ "$configured" -eq 0 && -n "${COPR_FEDORA_USERNAME:-}" && -n "${COPR_FEDORA_PASSWORD:-}" && -n "${COPR_FEDORA_OTP_SECRET:-}" ]]; then
            try_copr_auth "Fedora password and OTP" configure_fedora_password && configured=1
          fi
          if [[ "$configured" -eq 0 && -n "${COPR_LOGIN:-}" && -n "${COPR_TOKEN:-}" ]]; then
            try_copr_auth "API token" configure_token && configured=1
          fi
          if [[ "$configured" -eq 0 ]]; then
            echo "No configured COPR authentication method succeeded." >&2
            exit 1
          fi

      - name: Build SRPM
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          mkdir -p ~/rpmbuild/{SOURCES,SPECS,SRPMS}
          cp "seerrng-v${version}-linux-x64.tar.gz" ~/rpmbuild/SOURCES/
          cp packaging/aur/seerrng.{service,env,sysusers,tmpfiles} ~/rpmbuild/SOURCES/
          cp packaging/rpm/seerrng.spec ~/rpmbuild/SPECS/
          sed -i "s/^Version:.*/Version:        ${version}/" ~/rpmbuild/SPECS/seerrng.spec
          rpmbuild -bs ~/rpmbuild/SPECS/seerrng.spec --define "_topdir $HOME/rpmbuild"

      - name: Ensure COPR project exists
        env:
          COPR_PROJECT: ${{ secrets.COPR_PROJECT }}
        run: |
          set -euo pipefail
          project="${COPR_PROJECT:-seerrng}"
          chroots=(
            fedora-43-x86_64
            fedora-rawhide-x86_64
          )
          copr_args=()
          for chroot in "${chroots[@]}"; do
            copr_args+=(--chroot "$chroot")
          done
          if copr-cli get "$project" >/dev/null 2>&1; then
            copr-cli modify "$project" \
              "${copr_args[@]}" \
              --description "SeerrNG RPM builds" \
              --instructions "dnf copr enable keefshape/seerrng && dnf install seerrng"
          else
            copr-cli create "$project" \
              "${copr_args[@]}" \
            --description "SeerrNG RPM builds" \
            --instructions "dnf copr enable keefshape/seerrng && dnf install seerrng"
          fi

      - name: Upload to COPR
        env:
          COPR_PROJECT: ${{ secrets.COPR_PROJECT }}
        run: |
          srpm="$(find ~/rpmbuild/SRPMS -name '*.src.rpm' -print -quit)"
          copr-cli build \
            --chroot fedora-43-x86_64 \
            --chroot fedora-rawhide-x86_64 \
            --nowait \
            "${COPR_PROJECT:-seerrng}" "$srpm"
