name: Package Smoke Disabled

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to validate
        required: true

jobs:
  disabled:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: packaging/smoke/package-smoke seerrng github-archive "${{ inputs.tag }}" --arch amd64
