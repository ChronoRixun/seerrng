---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: SeerrNG CI

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKER_HUB: snapetech/seerrng

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  i18n:
    name: i18n Check
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, seerrng, linux-build]
    permissions:
      contents: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
      NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          clean: false

      - name: Pnpm Setup
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'package.json'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        env:
          CI: true
        run: pnpm install

      - name: i18n Check
        shell: bash
        env:
          I18N_LABEL: i18n-out-of-sync
          BODY: |
            The i18n check failed because translation messages are out of sync.

            This usually happens when you've added or modified translation strings in your code but haven't updated the translation file.

            Please run `pnpm i18n:extract` and commit the changes.
        run: |
          retry() { n=0; until "$@"; do n=$((n+1)); [ $n -ge 3 ] && break; echo "retry $n: $*" >&2; sleep 2; done; }
          check_failed=0; node bin/check-i18n.js || check_failed=$?
          pr_labels=$(gh pr view "$NUMBER" -R "$GH_REPO" --json labels -q '.labels[].name' 2>/dev/null) || true
          has_label=0
          while IFS= read -r name; do [ -n "$name" ] && [ "$name" = "$I18N_LABEL" ] && has_label=1 && break; done <<< "$pr_labels"
          if [ "$check_failed" -eq 1 ]; then
            [ "$has_label" -eq 0 ] && { retry gh pr edit "$NUMBER" -R "$GH_REPO" --add-label "$I18N_LABEL" || true; retry gh pr comment "$NUMBER" -R "$GH_REPO" -b "$BODY" || true; }
          else
            [ "$has_label" -eq 1 ] && retry gh pr edit "$NUMBER" -R "$GH_REPO" --remove-label "$I18N_LABEL" || true
          fi
          exit $check_failed
  test:
    name: Lint & Test Build
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, seerrng, linux-build]
    container: node:22.22.2-alpine3.23@sha256:8ea2348b068a9544dae7317b4f3aafcdc032df1647bb7d768a05a5cad1a7683f
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          clean: false

      - name: Pnpm Setup
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Get pnpm store directory
        shell: sh
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        env:
          CI: true
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Formatting
        run: pnpm format:check

      - name: Build
        run: pnpm build

  unit-test:
    name: Unit Tests
    if: github.event_name == 'pull_request'
    runs-on: [self-hosted, seerrng, linux-build]
    container: node:22.22.2-alpine3.23@sha256:8ea2348b068a9544dae7317b4f3aafcdc032df1647bb7d768a05a5cad1a7683f
    permissions:
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          clean: false

      - name: Pnpm Setup
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Get pnpm store directory
        shell: sh
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        env:
          CI: true
        run: pnpm install

      - name: Run tests
        env:
          CI: true
        run: pnpm test

      - name: Publish test report
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386 # v6.4.0
        if: success() || failure() # always run even if the previous step fails
        with:
          report_paths: 'report.xml'

  build:
    name: Build cache (${{ matrix.platform }})
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
    runs-on:
      [self-hosted, seerrng, linux-build, linux-amd64, linux-arm64-cross]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          clean: false

      - name: Commit timestamp
        id: ts
        run: echo "TIMESTAMP=$(git log -1 --pretty=%ct)" >> "$GITHUB_OUTPUT"

      - name: Image channel
        id: channel
        run: echo "CHANNEL=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: network=host

      - name: Warm cache (no push) — ${{ matrix.platform }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            COMMIT_TAG=${{ github.sha }}
            BUILD_VERSION=${{ steps.channel.outputs.CHANNEL }}
            SOURCE_DATE_EPOCH=${{ steps.ts.outputs.TIMESTAMP }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          provenance: false

  publish:
    name: Publish multi-arch image
    needs: build
    runs-on:
      [self-hosted, seerrng, linux-build, linux-amd64, linux-arm64-cross]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          clean: false

      - name: Commit timestamp
        id: ts
        run: echo "TIMESTAMP=$(git log -1 --pretty=%ct)" >> "$GITHUB_OUTPUT"

      - name: Image channel
        id: channel
        run: echo "CHANNEL=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: network=host

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.channel.outputs.CHANNEL }}
            type=sha
          labels: |
            org.opencontainers.image.created=${{ steps.ts.outputs.TIMESTAMP }}

      - name: Resolve base images with retry
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t base_images < <(
            awk '
              toupper($1) == "FROM" {
                image = ""
                for (i = 2; i <= NF; i++) {
                  if ($i ~ /^--/) {
                    continue
                  }
                  image = $i
                  break
                }
                if (image != "") {
                  images[image] = 1
                }
                for (i = 2; i < NF; i++) {
                  if (toupper($i) == "AS") {
                    aliases[$(i + 1)] = 1
                  }
                }
              }
              END {
                for (image in images) {
                  if (!(image in aliases)) {
                    print image
                  }
                }
              }
            ' Dockerfile | sort -u
          )
          for image in "${base_images[@]}"; do
            for attempt in 1 2 3 4 5; do
              echo "Resolving ${image} (attempt ${attempt}/5)"
              if docker buildx imagetools inspect "$image" >/dev/null; then
                break
              fi
              if [ "$attempt" -eq 5 ]; then
                echo "Unable to resolve ${image} after ${attempt} attempts" >&2
                exit 1
              fi
              sleep $((attempt * 15))
            done
          done

      - name: Build & Push (multi-arch, single tag)
        shell: bash
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_LABELS: ${{ steps.meta.outputs.labels }}
          COMMIT_TAG: ${{ github.sha }}
          BUILD_VERSION: ${{ steps.channel.outputs.CHANNEL }}
          SOURCE_DATE_EPOCH: ${{ steps.ts.outputs.TIMESTAMP }}
        run: |
          set -euo pipefail

          build_args=(
            --file ./Dockerfile
            --platform linux/amd64
            --push
            --build-arg "COMMIT_TAG=${COMMIT_TAG}"
            --build-arg "BUILD_VERSION=${BUILD_VERSION}"
            --build-arg "SOURCE_DATE_EPOCH=${SOURCE_DATE_EPOCH}"
            --cache-from type=gha,scope=linux/amd64
            --provenance false
          )

          while IFS= read -r tag; do
            [ -n "$tag" ] && build_args+=(--tag "$tag")
          done <<< "$IMAGE_TAGS"

          while IFS= read -r label; do
            [ -n "$label" ] && build_args+=(--label "$label")
          done <<< "$IMAGE_LABELS"

          for attempt in 1 2 3; do
            echo "Building and pushing image (attempt ${attempt}/3)"
            if docker buildx build "${build_args[@]}" .; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Image build/push failed after ${attempt} attempts" >&2
              exit 1
            fi
            sleep $((attempt * 30))
          done

  deploy-main:
    name: Deploy main to seerr.home
    if: github.ref == 'refs/heads/main'
    needs: publish
    runs-on: [self-hosted, seerrng, linux-build]
    permissions:
      contents: read
      packages: read
    env:
      SEERRNG_TAG: main
      SEERRNG_CONTAINER_NAME: ${{ vars.SEERRNG_CONTAINER_NAME || 'seerr-host' }}
      SEERRNG_PORT: ${{ vars.SEERRNG_PORT || '5055' }}
      SEERRNG_CONFIG_DIR: ${{ vars.SEERRNG_CONFIG_DIR || '/mnt/datapool_lvm_media/seerrng-config' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
          clean: false

      - name: Log in to GitHub Container Registry on seerr.home
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh kspls0 \
            "docker login ghcr.io --username '${{ github.repository_owner }}' --password-stdin"

      - name: Pull latest main image
        run: ssh kspls0 "docker pull ghcr.io/${{ github.repository }}:main"

      - name: Prepare config directory
        run: |
          ssh kspls0 "sudo install -d -m 0755 '$SEERRNG_CONFIG_DIR' && sudo chown -R 1000:1000 '$SEERRNG_CONFIG_DIR'"

      - name: Deploy seerr.home
        run: |
          ssh kspls0 \
            "SEERRNG_CONTAINER_NAME='$SEERRNG_CONTAINER_NAME' \
            SEERRNG_PORT='$SEERRNG_PORT' \
            SEERRNG_CONFIG_DIR='$SEERRNG_CONFIG_DIR' \
            SEERRNG_TAG='$SEERRNG_TAG' \
            TZ='${TZ:-America/Regina}' \
            LOG_LEVEL='${LOG_LEVEL:-info}' \
            REPOSITORY='${{ github.repository }}' \
            bash -s" <<'EOF'
          docker rm -f "$SEERRNG_CONTAINER_NAME" 2>/dev/null || true
          docker run -d \
            --name "$SEERRNG_CONTAINER_NAME" \
            --restart unless-stopped \
            --network host \
            -e TZ="$TZ" \
            -e PORT="$SEERRNG_PORT" \
            -e CONFIG_DIRECTORY=/app/config \
            -e LOG_LEVEL="$LOG_LEVEL" \
            -v "$SEERRNG_CONFIG_DIR:/app/config" \
            "ghcr.io/$REPOSITORY:$SEERRNG_TAG"
          EOF

      - name: Verify seerr.home deployment
        run: |
          ssh kspls0 \
            "SEERRNG_CONTAINER_NAME='$SEERRNG_CONTAINER_NAME' \
            SEERRNG_PORT='$SEERRNG_PORT' \
            GITHUB_SHA='$GITHUB_SHA' \
            bash -s" <<'EOF'
          docker ps --filter "name=^/${SEERRNG_CONTAINER_NAME}$" --filter "status=running" --format '{{.Names}}' | grep -qx "$SEERRNG_CONTAINER_NAME"
          status_ready=false
          for i in $(seq 1 90); do
            if curl --fail --silent --show-error "http://127.0.0.1:${SEERRNG_PORT}/api/v1/status" --output status.json; then
              status_ready=true
              cat status.json
              break
            fi
            sleep 2
          done
          test "$status_ready" = true
          grep -q "\"commitTag\":\"${GITHUB_SHA}\"" status.json
          EOF
