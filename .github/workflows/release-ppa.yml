name: Publish Launchpad PPA

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true

permissions:
  contents: read

jobs:
  publish-ppa:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ubuntu_series: [jammy, noble]
    steps:
      - name: Resolve version
        id: version
        run: |
          tag="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y build-essential debhelper devscripts dpkg-dev gnupg curl

      - name: Download Linux asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in {1..80}; do
            if gh release download "${{ steps.version.outputs.tag }}" -R "$GITHUB_REPOSITORY" --pattern "seerrng-${{ steps.version.outputs.tag }}-linux-x64.tar.gz" --clobber; then
              exit 0
            fi
            sleep 30
          done
          exit 1

      - name: Import GPG key
        id: gpg
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$GPG_PRIVATE_KEY"
          printf '%s\n' "$GPG_PRIVATE_KEY" | gpg --batch --import
          fingerprint="$(gpg --batch --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
          test -n "$fingerprint"
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"

      - name: Prepare source package
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          series="${{ matrix.ubuntu_series }}"
          src="seerrng-${version}"
          rm -rf "$src"
          mkdir -p "$src/usr/lib/seerrng" "$src/usr/bin" "$src/lib/systemd/system" "$src/etc/seerrng" \
            "$src/usr/lib/sysusers.d" "$src/usr/lib/tmpfiles.d"
          tar -xzf "seerrng-v${version}-linux-x64.tar.gz" --strip-components=1 -C "$src/usr/lib/seerrng"
          ln -s /usr/lib/seerrng/start.sh "$src/usr/bin/seerrng"
          cp packaging/aur/seerrng.service "$src/lib/systemd/system/"
          cp packaging/aur/seerrng.env "$src/etc/seerrng/"
          cp packaging/aur/seerrng.sysusers "$src/usr/lib/sysusers.d/seerrng.conf"
          cp packaging/aur/seerrng.tmpfiles "$src/usr/lib/tmpfiles.d/seerrng.conf"
          cp -r packaging/debian "$src/debian"
          find "$src/usr/lib/seerrng" -type f \
            | sed "s#^$src/##" \
            > "$src/debian/source/include-binaries"
          ppa_rev="$(date -u +%Y%m%d%H%M)"
          cat > "$src/debian/changelog" <<EOF
          seerrng (${version}+ppa${ppa_rev}~${series}) ${series}; urgency=medium

            * Release ${{ steps.version.outputs.tag }}

           -- snapetech <seerrng@proton.me>  $(date -R)
          EOF

      - name: Build signed source package
        run: |
          set -euo pipefail
          cd "seerrng-${{ steps.version.outputs.version }}"
          debuild -S -sa -k"${{ steps.gpg.outputs.fingerprint }}"

      - name: Upload to Launchpad
        env:
          LAUNCHPAD_PPA: ${{ secrets.LAUNCHPAD_PPA || vars.LAUNCHPAD_PPA }}
        run: |
          set -euo pipefail

          raw_target="${LAUNCHPAD_PPA:-}"
          if [[ -z "$raw_target" ]]; then
            echo "Set LAUNCHPAD_PPA to ppa:<owner>/<archive>, ~<owner>/ubuntu/<archive>, or ftp://ppa.launchpad.net/~<owner>/ubuntu/<archive>/." >&2
            exit 1
          fi

          raw_target="${raw_target%/}"
          case "$raw_target" in
            ppa:*)
              shorthand="${raw_target#ppa:}"
              owner="${shorthand%%/*}"
              archive="${shorthand#*/}"
              if [[ -z "$owner" || -z "$archive" || "$owner" == "$archive" ]]; then
                echo "Invalid LAUNCHPAD_PPA shorthand: $raw_target" >&2
                exit 1
              fi
              path="~${owner#\~}/ubuntu/${archive}"
              ;;
            ftp://ppa.launchpad.net/*)
              path="${raw_target#ftp://ppa.launchpad.net/}"
              ;;
            \~*/ubuntu/*)
              path="$raw_target"
              ;;
            *)
              echo "Invalid LAUNCHPAD_PPA target: $raw_target" >&2
              echo "Expected ppa:<owner>/<archive>, ~<owner>/ubuntu/<archive>, or ftp://ppa.launchpad.net/~<owner>/ubuntu/<archive>/." >&2
              exit 1
              ;;
          esac

          path="${path%/}"
          if [[ ! "$path" =~ ^~[^/]+/ubuntu/[^/]+$ ]]; then
            echo "Invalid Launchpad upload path after normalization: $path" >&2
            exit 1
          fi

          owner="${path%%/ubuntu/*}"
          archive="${path##*/ubuntu/}"
          owner_name="${owner#\~}"
          archive_api="https://api.launchpad.net/1.0/~${owner_name}/+archive/ubuntu/${archive}"
          archive_web="https://launchpad.net/~${owner_name}/+archive/ubuntu/${archive}"

          if ! curl --fail --silent --show-error "$archive_api" >/dev/null; then
            echo "Launchpad PPA does not exist or is not public: $archive_web" >&2
            echo "Create that PPA, or set LAUNCHPAD_PPA to an existing archive owned by ${owner}." >&2
            echo "Public PPAs currently visible for ${owner}:" >&2
            curl --fail --silent "https://api.launchpad.net/1.0/${owner}/ppas" \
              | python3 -c 'import json, sys; data=json.load(sys.stdin); [print("  {} ({})".format(entry["reference"], entry["web_link"])) for entry in data.get("entries", [])]' >&2 \
              || true
            exit 1
          fi

          changes="$(find . -maxdepth 1 -name '*.changes' -print -quit)"
          test -n "$changes"
          {
            printf '[seerrng-ppa]\n'
            printf 'fqdn = ppa.launchpad.net\n'
            printf 'method = ftp\n'
            printf 'incoming = %s\n' "$path"
            printf 'login = anonymous\n'
            printf 'allow_unsigned_uploads = 0\n'
          } > ~/.dput.cf
          echo "Uploading $changes to $archive_web"
          dput -f seerrng-ppa "$changes"
